services:
  nginx:
    ports:
      - "5000:80"
      # - "80:80"
      # - "443:443"
    volumes:
      - ./server/config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # If it doesn't exist; do "openssl dhparam -out dhparam.pem 2048" in server, migth need chmod 600 /etc/nginx/dhparam.pem, default unix path for certs is: /etc/ssl/certs
      - ./server/config/certbot/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - nginx-logs:/var/log/nginx

  app:
    build:
      context: .
      dockerfile: ./server/config/bun.Dockerfile
    volumes:
      - ./.data:/app/.data
      - ./.env:/app/.env
      - ./.env.development:/app/.env.development
      - ./.env.production:/app/.env.production
      - ./node_modules:/app/node_modules
      - /app/node_modules
      - ./.nuxt:/app/.nuxt
      - ./.output:/app/.output
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    environment:
      - NODE_ENV=development
      - MONGO_USER=Bader
      - MONGO_PASSWORD=myPassword
      - MONGO_DB_NAME=portfolio
      - SESSION_SECRET=someSecret
      - REDIS_USER=default
      - REDIS_PASSWORD=myPassword
      - POSTGRES_PASSWORD=example
      - POSTGRES_DB=articles
      - JWT_SECRET=jwtSecret
      - JWT_LIFETIME=3h # zach says 2 weeks for prod!

      - MONGO_URI=mongodb://Bader:myPassword@mongo:27017/portfolio?authSource=admin

    command: bun start
  mongo:
    environment:
      - MONGO_INITDB_ROOT_USERNAME=Bader
      - MONGO_INITDB_ROOT_PASSWORD=myPassword
  redis:
    environment:
      - REDIS_USER=default
      - REDIS_PASSWORD=myPassword
  #   command:
  #     - redis-server --requirepass myPassword

volumes:
  nginx-logs:
