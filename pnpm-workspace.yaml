  - '@takumi-rs/core-darwin-arm64@1.8.0 || 1.8.1'
  - '@takumi-rs/core-darwin-x64@1.8.0 || 1.8.1'
  - '@takumi-rs/core-linux-arm64-gnu@1.8.0 || 1.8.1'
  - '@takumi-rs/core-linux-arm64-musl@1.8.0 || 1.8.1'
  - '@takumi-rs/core-linux-x64-gnu@1.8.0 || 1.8.1'
  - '@takumi-rs/core-linux-x64-musl@1.8.0 || 1.8.1'
  - '@takumi-rs/core-win32-arm64-msvc@1.8.0 || 1.8.1'
  - '@takumi-rs/core-win32-x64-msvc@1.8.0 || 1.8.1'
  - '@takumi-rs/core@1.8.0 || 1.8.1'
