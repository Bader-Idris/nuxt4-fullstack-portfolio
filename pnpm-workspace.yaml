packages:
  - "."
allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@prisma/engines': true
  better-sqlite3: true
  core-js: true
  electron-winstaller: true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
# ----------------------
# pnpm clean --lockfile
# collapsing option is: pnpm store prune ; don't use it until needed!
# pnpm install
# check how to change pkgs with: .pnpmfile.mjs at: https://pnpm.io/pnpmfile
# ----------------------
