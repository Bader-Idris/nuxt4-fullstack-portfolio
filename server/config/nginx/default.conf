map $cookie_io $backend {
  # Use cookie if present, otherwise generate unique key
  default "${remote_addr}-${http_user_agent}-${msec}";
  ~^(?<session_id>.+)$ $session_id;
}

# http {
  # events {}
  upstream nuxt_app {
    # for socket io multi-instances
    # enable sticky session with either "hash" (uses the complete IP address)
    # hash $remote_addr consistent;
    # or "ip_hash" (uses the first three octets of the client IPv4 address, or the entire IPv6 address)
    # ip_hash;
    # or "sticky" (needs commercial subscription)
    # sticky cookie srv_id expires=1h domain=.example.com path=/;

    hash $backend consistent;

    server portoflio-app-1:3000;
    server portoflio-app-2:3000;
    # server portoflio-app-3:3000;
  }

  server {
    # great to read for prod:
    # https://www.digitalocean.com/community/tutorials/how-to-secure-a-containerized-node-js-application-with-nginx-let-s-encrypt-and-docker-compose
    listen 80;
    listen [::]:80;
    # root /usr/share/nginx/html;
    # index index.html index.htm index.nginx-debian.html;
    server_name baderidris.com www.baderidris.com;

    server_tokens off;
    # more_clear_headers Server; this removes sever name for req.headers

    # this is to send files without caching, or use max-age=3600 using seconds! so this is an hour
    add_header Cache-Control max-age=7200;

    # location / {
    #   try_files $uri /index.html;
    # }
    location =/.well-known/mta-sts.txt {
      root /var/www/html/;
    }

    # Socket.IO specific location
    location /socket.io/ {
      if ($cookie_io = "") {
        set $new_id "${remote_addr}-${http_user_agent}-${msec}";
        add_header Set-Cookie "io=$new_id; Path=/; HttpOnly; Secure; SameSite=Lax";
      }
      proxy_pass http://nuxt_app;

      # Important for socket io; check the docs https://socket.io/docs/v4/using-multiple-nodes/#nginx-configuration
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Ensure cookies are passed for long polling
      # proxy_set_header Cookie $http_cookie;

      # Increase timeouts for WebSocket connections
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
      proxy_connect_timeout 60s;

      # Buffering adjustments for WebSocket
      # proxy_buffers 8 32k;
      # proxy_buffer_size 64k;
      # proxy_busy_buffers_size 128k;
      proxy_buffering off;
    }

    location / {
      # was http://app:3000 before socket io multi replicas support!
      proxy_pass http://nuxt_app; 
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # 🔴🔴 proxy_set_header Host $http_host; allows ports while $host is for prod

      proxy_set_header X-Forwarded-Host $host;
      # check https://expressjs.com/en/guide/behind-proxies.html
      proxy_set_header X-Nginx-Proxy true;
      proxy_redirect off;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_set_header X-Forwarded-Proto $scheme;

      # change it if users upload videos.
      client_max_body_size    10m;
      client_body_buffer_size 128k;
        # 90 seconds
      proxy_connect_timeout   90;
      proxy_send_timeout      90;
      proxy_read_timeout      90;
      proxy_buffers           32 4k;

      # for vue configs brough from router.vuejs.org
      # try_files $uri /index.html;

      # Add CSP header to allow images from raw.githubusercontent.com
      add_header Content-Security-Policy "default-src 'self' 'unsafe-eval' 'unsafe-inline' http: https: ws: wss: blob: data: capacitor://localhost;  img-src 'self' https://baderidris.com https://*.githubusercontent.com https://www.googletagmanager.com data:;  frame-ancestors 'self';" always;
    }

    # let's encrypt temp file path
    location ~ /.well-known/acme-challenge {
      allow all;
      root /var/www/html;
    }
  }
  # to reload nginx use: docker exec -it <container_id>
  # nginx -s reload
# }
