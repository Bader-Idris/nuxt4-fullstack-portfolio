# Use cookie if present, otherwise generate unique key
map $cookie_io $backend {
  default "${remote_addr}-${http_user_agent}-${msec}";
  ~^(?<session_id>.+)$ $session_id;
}

# http {
  # events {}
  upstream nuxt_app {
    # for socket io multi-instances
    # enable sticky session with either "hash" (uses the complete IP address)
    # hash $remote_addr consistent;
    # or "ip_hash" (uses the first three octets of the client IPv4 address, or the entire IPv6 address)
    # ip_hash;
    # or "sticky" (needs commercial subscription)
    # sticky cookie srv_id expires=1h domain=.example.com path=/;

    hash $backend consistent;

    server portfolio-app-1:3000;
    server portfolio-app-2:3000;
    # server portfolio-app-3:3000;
  }

  server {
    # great to read for prod:
    # https://www.digitalocean.com/community/tutorials/how-to-secure-a-containerized-node-js-application-with-nginx-let-s-encrypt-and-docker-compose
    listen 80;
    listen [::]:80;
    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;
    server_name baderidris.com www.baderidris.com;

    server_tokens off;
    # more_clear_headers Server; this removes sever name for req.headers

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # this is to send files without caching, or use max-age=3600 using seconds! so this is an hour
    add_header Cache-Control "max-age=7200, public";

    # Global max body size for uploads
    client_max_body_size 10m;

    # Nuxt static assets - immutable and long cache
    location ~* ^/_nuxt/ {
        gzip_static on;
        # brotli_static on; # Uncomment if your nginx has brotli module
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri @app;
    }

    # Other static assets in public folder
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|ttc|mp4|webm|webp|avif)$ {
        gzip_static on;
        # brotli_static on; # Uncomment if your nginx has brotli module
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri @app;
    }

    location @app {
        proxy_pass http://nuxt_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Nginx-Proxy true;
        proxy_cache_bypass $http_upgrade;

        # timeouts
        proxy_connect_timeout   90;
        proxy_send_timeout      90;
        proxy_read_timeout      90;
    }

    # Socket.IO specific location
    location /socket.io/ {
      if ($cookie_io = "") {
        set $new_id "${remote_addr}-${http_user_agent}-${msec}";
        add_header Set-Cookie "io=$new_id; Path=/; HttpOnly; Secure; SameSite=Lax";
      }
      proxy_pass http://nuxt_app;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
      proxy_connect_timeout 60s;
      proxy_buffering off;
    }

    location / {
        # Add CSP header to allow images from raw.githubusercontent.com
        add_header Content-Security-Policy "default-src 'self' 'unsafe-eval' 'unsafe-inline' http: https: ws: wss: blob: data: capacitor://localhost;  img-src 'self' https://baderidris.com https://*.githubusercontent.com https://www.googletagmanager.com https://*.google-analytics.com https://*.g.doubleclick.net https://*.clarity.ms https://c.bing.com data:;  frame-ancestors 'self';" always;

        try_files $uri @app;
    }

    # let's encrypt temp file path
    location ~ /.well-known/acme-challenge {
      allow all;
      root /var/www/html;
    }
  }
  # to reload nginx use: docker exec -it <container_id>
  # nginx -s reload
