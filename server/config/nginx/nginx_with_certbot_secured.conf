# Rate limiting zone for excessive requests, 10MBs in cache, 13 rps
limit_req_zone $binary_remote_addr zone=limitreq:10m rate=13r/s;
# Cache 10m for each
limit_conn_zone $binary_remote_addr zone=connlimit:10m;
limit_conn_zone $server_name zone=perserver:10m;

# ? tested robust approach to have both sticky sessions and load balancing! FOR FREE nginx! 🔥
map $cookie_io $backend {
  # Use cookie if present, otherwise generate unique key
  default "${remote_addr}-${http_user_agent}-${msec}";
  ~^(?<session_id>.+)$ $session_id;
}

upstream nuxt_app {
    # enable sticky session with either "hash" (uses the complete IP address)
    # hash $remote_addr consistent;
    # or "ip_hash" (uses the first three octets of the client IPv4 address, or the entire IPv6 address)
    # ip_hash;
    # or "sticky" (needs commercial subscription)
    # sticky cookie srv_id expires=1h domain=.example.com path=/;

    hash $backend consistent;

    # ! You have to put the container name or outer server ip
    server portfolio-app-1:3000;
    server portfolio-app-2:3000;
    # server nuxt_app_3:3000;
    # what's the default value to => keepalive 64;
}

server {
  listen 80;
  listen [::]:80;
  server_name baderidris.com www.baderidris.com;

  server_tokens       off;

  location ~ /.well-known/acme-challenge {
    allow all;
    root /var/www/certbot;
  }

  # location / { # this was only to redirect to secured layer
  #   rewrite ^ https://$host$request_uri? permanent;
  # }
  location / {
    return 301 https://baderidris.com$request_uri;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name mail.baderidris.com mta-sts.baderidris.com;

  server_tokens       off;

  location ~ /.well-known/acme-challenge {
    allow all;
    root /var/www/certbot;
  }

  location =/.well-known/mta-sts.txt {
    root /var/www/html/;
  }

  # Catch-all to prevent 404s on this server block
  location / {
    return 204;
  }
}

server {
  # ! it's important to stay up to date with: OSCP stapling
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name         baderidris.com;

  # hides nginx version
  server_tokens       off;

  ssl_certificate     /etc/letsencrypt/live/baderidris.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/baderidris.com/privkey.pem;

  ssl_buffer_size     8k;

  ssl_dhparam         /etc/ssl/certs/dhparam.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
  # Using sslLabs, these are the only non-supported browsers:
  # Chrome 49 / XP SP3	Server sent fatal alert: handshake_failure
  # Safari 6 / iOS 6.0.1	Server sent fatal alert: handshake_failure
  # Safari 7 / iOS 7.1  R	Server sent fatal alert: handshake_failure
  # Safari 7 / OS X 10.9  R	Server sent fatal alert: handshake_failure
  # Safari 8 / iOS 8.4  R	Server sent fatal alert: handshake_failure
  # Safari 8 / OS X 10.10  R	Server sent fatal alert: handshake_failure

  ssl_ecdh_curve secp384r1;
  ssl_session_tickets off;

  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 8.8.4.4;

  root /var/www/html;

  # Security headers
  # ! Don't put them in @app, this is their proper position!
  # ? Check your site at: securityheaders.com
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  # add_header X-Powered-By "Nginx" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' 'unsafe-eval' 'unsafe-inline' http: https: ws: wss: blob: data: capacitor://localhost;  img-src 'self' https://baderidris.com https://*.githubusercontent.com https://www.googletagmanager.com https://*.google-analytics.com https://*.g.doubleclick.net https://*.clarity.ms https://c.bing.com data:;  frame-ancestors 'self';" always;
  add_header Permissions-Policy        "interest-cohort=()" always;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  # enable strict transport security only if you understand the implications
  # check this for more info https://hstspreload.org/

  # Nuxt static assets - immutable and long cache
  location ~* ^/_nuxt/ {
    gzip_static on;
    # brotli_static on; # Uncomment if your nginx has brotli module
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin "*";
    access_log off;
    # Try serving the file directly, fall back to @app
    try_files $uri @app;
  }

  # Other static assets in public folder
  location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|ttc|mp4|webm|webp|avif)$ {
    gzip_static on;
    # brotli_static on; # Uncomment if your nginx has brotli module
    expires 1h;
    add_header Cache-Control "public";
    access_log off;
    try_files $uri @app;
  }

  #  favicon.ico specific rule preserved for its unique headers
  location = /favicon.ico {
    # 8 hours
    add_header Cache-Control "public, max-age=28800, immutable";
    # Allow all origins for CORS (optional)
    add_header Access-Control-Allow-Origin "*";
    add_header Content-Security-Policy "";
    log_not_found off;  # Disable logging for 404 errors for this file
    try_files $uri @app;
  }

  # Socket.IO specific location
  location /socket.io/ {
    if ($cookie_io = "") {
      set $new_id "${remote_addr}-${http_user_agent}-${msec}";
      add_header Set-Cookie "io=$new_id; Path=/; HttpOnly; Secure; SameSite=Lax";
    }
    # TODO: Important for socket io; check the docs https://socket.io/docs/v4/using-multiple-nodes/#nginx-configuration
    proxy_pass http://nuxt_app;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https; # Force https for socket.io too

    # Cookie handling for sticky sessions
    # proxy_set_header Cookie $http_cookie;

    # proxy_read_timeout must be bigger than (pingInterval + pingTimeout) defaults to (20 + 25) https://socket.io/docs/v4/using-multiple-nodes/#nginx-configuration
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 60s;

    # Buffering adjustments for WebSocket
    # proxy_buffers 8 32k;
    # proxy_buffer_size 64k;
    # proxy_busy_buffers_size 128k;
    # TODO: server defaults to 1MB which is sufficient
    proxy_buffering off;
  }

  location @app {
    # TODO: for stickiness we allowed it in upstream, but do we need to create it here??
    proxy_pass http://nuxt_app;

    # Useful headers for proxying
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Nginx-Proxy true;
    proxy_redirect off;
    # TODO: does this cause not being http 1.3??
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    # TODO: differences between $connection_upgrade and 👇
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    # ! Fixed for SSL: hardcode https so Nuxt knows the real protocol behind the proxy,
    # ! preventing redirect loops and broken asset URLs on SSL termination.
    proxy_set_header X-Forwarded-Proto https;

    # Proxy timeouts
    proxy_connect_timeout              10s;
    proxy_send_timeout                 10s;
    proxy_read_timeout                 10s;
  }

  location / {
    # Apply rate limiting here # 10 beyond the limit before banning with fail2ban after nginx throws 503 error
    limit_conn connlimit 20;
    limit_req zone=limitreq burst=10 nodelay;
    limit_conn perserver 50;
    # limit_req off; # Put in Location to Exempt Specific Queries

    try_files $uri @app;
  }

  # gzip
  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types      text/plain text/css application/xml application/xml+rss text/javascript model/gltf-binary text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml font/woff2 font/woff font/ttf image/png audio/wav image/jpeg image/jpg image/gif;
}

# Redirect HTTPS server block for www.baderidris.com
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name         www.baderidris.com;

  server_tokens off;

  ssl_certificate     /etc/letsencrypt/live/baderidris.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/baderidris.com/privkey.pem;
  ssl_buffer_size     8k;
  ssl_dhparam         /etc/ssl/certs/dhparam.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
  ssl_ecdh_curve secp384r1;
  ssl_session_tickets off;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 8.8.4.4;

  location / {
    return 301 https://baderidris.com$request_uri;
  }
}

server {
  # added this after setting the two required DNS {A,TXT} records for MTA-STS layer
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name mta-sts.baderidris.com mail.baderidris.com;

  server_tokens       off;

  ssl_certificate     /etc/letsencrypt/live/baderidris.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/baderidris.com/privkey.pem;
  # TODO: do I need this
  # ssl_trusted_certificate /etc/letsencrypt/live/baderidris.com/chain.pem;

  ssl_buffer_size     8k;

  ssl_dhparam         /etc/ssl/certs/dhparam.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

  ssl_ecdh_curve secp384r1;
  ssl_session_tickets off;

  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 8.8.4.4;

  # Aggressive Rate Limiting
  limit_req zone=limitreq burst=5 nodelay;
  limit_conn connlimit 5;

  location =/.well-known/mta-sts.txt {
    # bound in the compose file nginx service
    root /var/www/html/;
    limit_req zone=limitreq burst=3 nodelay;
  }

  # Catch-all to prevent 404s on this server block
  location / {
    return 204;
  }
}
# docs: https://www.digitalocean.com/community/tutorials/how-to-secure-a-containerized-node-js-application-with-nginx-let-s-encrypt-and-docker-compose#step-5-modifying-the-web-server-configuration-and-service-definition

# To prevent all non-existing domains use, it throws ERR_SSL_UNRECOGNIZED_NAME_ALERT to unwanted domains!
server {
  listen 80 default_server;
  listen [::]:80 default_server;

  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;
  ssl_reject_handshake on;

  server_name _;
  return 444;
}